name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      JWT_SECRET: this-is-a-ci-only-secret-with-more-than-32-characters
      FRONTEND_ORIGIN: http://localhost:5173
      USAGE_WEBHOOK_SECRET: ci-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - name: Route module smoke-load
        run: node -e "require('./src/routes/auth'); require('./src/routes/user'); require('./src/routes/billing'); require('./src/routes/stripeWebhook'); require('./src/routes/affiliate'); require('./src/routes/twilio'); require('./src/routes/usage');"
